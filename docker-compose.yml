services:
  comfyui:
    profiles: ["local"]
    build: ./docker/comfyui
    ports:
      - "8188:8188"
    volumes:
      - ./comfyui/models:/app/models
      - ./comfyui/input:/app/input
      - ./comfyui/output:/app/output
      - ./comfyui/user:/app/user
    restart: unless-stopped

  proxy:
    build: ./server
    ports:
      - "8189:8189"
    environment:
      - COMFY_URL=${COMFY_URL:-https://cloud.comfy.org}
      - COMFY_API_KEY=${COMFY_API_KEY:-}
      - PORT=8189
    restart: unless-stopped
